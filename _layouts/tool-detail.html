---
layout: default
---

<section class="tool-detail">
  <div class="container">
    <a href="{{ '/#ai-tools' | relative_url }}" class="back-link">← Quay lại danh sách công cụ</a>

    <div class="tool-detail__header">
      <div class="tool-detail__icon">{{ page.icon }}</div>
      <div>
        <h1>{{ page.tool_name | default: page.title }}</h1>
        <p>{{ page.description }}</p>
      </div>
    </div>

    {% if page.subjects %}
      <div class="tool-detail__tags">
        {% for subject in page.subjects %}
          <span class="tool-tag">{{ subject }}</span>
        {% endfor %}
      </div>
    {% endif %}

    <div class="tool-detail__content">
      {{ content }}
    </div>
  </div>
</section>
